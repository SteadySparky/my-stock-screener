name: Stock Screener
on:
  workflow_dispatch: # Allows manual run
  schedule:
    - cron: '30 21 * * *' # Runs every day at 21:30 UTC (9:30 PM UK)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Libraries
        run: |
          pip install yfinance pandas

      - name: Execute Script
        run: python screener.py

      - name: Save Results to Repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add usa_hits.csv uk_hits.csv || echo "No files to add"
          git commit -m "Update daily hits" || echo "No changes to commit"
          git push
