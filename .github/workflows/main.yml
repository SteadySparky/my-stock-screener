name: Stock Screener
on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for saving the CSV files
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Libraries
        run: pip install yfinance pandas

      - name: Execute Script
        run: python screener.py

      - name: Save Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add usa_hits.csv uk_hits.csv
          git commit -m "Daily Scan Update" || exit 0
          git push
