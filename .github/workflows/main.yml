name: Stock Screener
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # <--- Changed from 3.10 to 3.12

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas-ta-classic
          
      - name: Execute Script
        run: python screener.py
