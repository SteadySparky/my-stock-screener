name: Run Stock Screener
on:
  workflow_dispatch: # Allows you to click a button to run it
  schedule:
    - cron: '0 21 * * *' # Runs every day at 9 PM UTC

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install yfinance pandas pandas_ta

      - name: Execute Script
        run: python screener.py

      - name: Save Findings
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add hits.csv || exit 0
          git commit -m "Update hits" || exit 0
          git push
